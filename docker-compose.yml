version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: haseb
      POSTGRES_USER: haseb
      POSTGRES_PASSWORD: haseb_dev_password
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haseb"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://haseb:haseb_dev_password@db:5432/haseb
      PORT: 3000
      USE_MOCK_HARNESS: "true"
    ports: ["3000:3000"]
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data:
