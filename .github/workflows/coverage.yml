name: Coverage Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run coverage report daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: postgres
          POSTGRES_DB: haseb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          timeout 60 bash -c 'until pg_isready -h localhost -p 5432; do sleep 1; done'

      - name: Setup test database
        run: |
          cp .env.test .env
          npm run seed:test seed

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Process coverage report
        run: |
          # Generate coverage summary
          npx nyc report --reporter=text-summary > coverage-summary.txt

          # Extract coverage percentage
          COVERAGE_PERCENTAGE=$(npx nyc report --reporter=text-summary | grep "Lines" | awk '{print $2}' | sed 's/%//')
          echo "COVERAGE_PERCENTAGE=$COVERAGE_PERCENTAGE" >> $GITHUB_ENV

          # Generate coverage badge
          if [ "$COVERAGE_PERCENTAGE" -ge 90 ]; then
            COLOR="brightgreen"
          elif [ "$COVERAGE_PERCENTAGE" -ge 80 ]; then
            COLOR="yellow"
          elif [ "$COVERAGE_PERCENTAGE" -ge 70 ]; then
            COLOR="orange"
          else
            COLOR="red"
          fi

          echo "BADGE_COLOR=$COLOR" >> $GITHUB_ENV

      - name: Create coverage badge
        uses: schneegans/dynamic-badges-action@v1.6.0
        with:
          auth: ${{ secrets.GITHUB_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: coverage-badge.svg
          label: Coverage
          message: "${{ env.COVERAGE_PERCENTAGE }}%"
          color: ${{ env.BADGE_COLOR }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: all-tests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: |
            coverage/
            coverage-summary.txt
          retention-days: 30

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const coverageSummary = fs.readFileSync('coverage-summary.txt', 'utf8');

            const coveragePercentage = process.env.COVERAGE_PERCENTAGE;
            const coverageMessage = `## 📊 Coverage Report

            **Current Coverage: ${coveragePercentage}%**

            <details>
            <summary>📋 Coverage Details</summary>

            \`\`\`
            ${coverageSummary}
            \`\`\`
            </details>

            ---
            *Coverage report generated automatically*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: coverageMessage
            });

      - name: Check coverage threshold
        run: |
          COVERAGE_THRESHOLD=90
          if [ "$COVERAGE_PERCENTAGE" -lt "$COVERAGE_THRESHOLD" ]; then
            echo "❌ Coverage ${COVERAGE_PERCENTAGE}% is below threshold ${COVERAGE_THRESHOLD}%"
            echo "::warning::Coverage is below the required threshold of ${COVERAGE_THRESHOLD}%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE_PERCENTAGE}% meets threshold ${COVERAGE_THRESHOLD}%"
          fi

      - name: Update README with coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Update README.md with coverage badge
          if [ -n "${{ secrets.COVERAGE_GIST_ID }}" ]; then
            BADGE_URL="https://gist.githubusercontent.com/${{ github.repository_owner }}/${{ secrets.COVERAGE_GIST_ID }}/raw/coverage-badge.svg"

            # Update or add coverage badge in README
            if grep -q "coverage-badge.svg" README.md; then
              sed -i "s|https://gist.githubusercontent.com/.*/coverage-badge.svg|$BADGE_URL|" README.md
            else
              # Add badge after main title
              sed -i "2i\\n![Coverage]($BADGE_URL)" README.md
            fi

            # Commit changes if badge was updated
            if git diff --quiet README.md; then
              echo "No changes to README.md"
            else
              git config --local user.email "action@github.com"
              git config --local user.name "GitHub Action"
              git add README.md
              git commit -m "Update coverage badge: ${COVERAGE_PERCENTAGE}%"
              git push
            fi
          fi

  coverage-diff:
    name: Coverage Diff Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate base coverage
        run: |
          git checkout origin/${{ github.base_ref }}
          cp .env.test .env || true
          npm run seed:test seed || true
          npm run test:coverage || true
          mv coverage coverage-base || true

      - name: Generate PR coverage
        run: |
          git checkout ${{ github.sha }}
          cp .env.test .env
          npm run seed:test seed
          npm run test:coverage
          mv coverage coverage-pr

      - name: Compare coverage
        run: |
          # Install coverage comparison tool
          npm install -g diff2html-cli

          # Generate coverage comparison
          if [ -d "coverage-base" ] && [ -d "coverage-pr" ]; then
            # Compare coverage summaries
            BASE_LINES=$(npx nyc report --reporter=text-summary --report-dir=coverage-base | grep "Lines" | awk '{print $2}' | sed 's/%//' || echo "0")
            PR_LINES=$(npx nyc report --reporter=text-summary --report-dir=coverage-pr | grep "Lines" | awk '{print $2}' | sed 's/%//' || echo "0")

            DIFF=$((PR_LINES - BASE_LINES))

            echo "Base coverage: ${BASE_LINES}%"
            echo "PR coverage: ${PR_LINES}%"
            echo "Coverage diff: ${DIFF}%"

            # Create coverage diff report
            cat << EOF > coverage-diff.md
            # Coverage Diff Analysis

            | Metric | Base | PR | Diff |
            |--------|------|----|------|
            | Lines Coverage | ${BASE_LINES}% | ${PR_LINES}% | ${DIFF}% |

            EOF

            if [ $DIFF -gt 0 ]; then
              echo "✅ Coverage improved by ${DIFF}%"
            elif [ $DIFF -lt 0 ]; then
              echo "⚠️ Coverage decreased by ${ABS(DIFF)}%"
            else
              echo "➖ Coverage unchanged"
            fi
          else
            echo "Could not generate coverage comparison"
            echo "# Coverage Diff Analysis" > coverage-diff.md
            echo "Could not generate coverage comparison due to missing base coverage data." >> coverage-diff.md
          fi

      - name: Comment PR with coverage diff
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');

            if (fs.existsSync('coverage-diff.md')) {
              const coverageDiff = fs.readFileSync('coverage-diff.md', 'utf8');

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: coverageDiff
              });
            }

      - name: Upload coverage diff artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-diff
          path: |
            coverage-base/
            coverage-pr/
            coverage-diff.md
          retention-days: 7