name: 🔒 Security Scanning & Vulnerability Detection

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of security scan to perform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - code
          - dependencies
          - container
          - infrastructure

env:
  NODE_VERSION: '20'
  SEVERITY_THRESHOLD: 'medium'

jobs:
  # Code Security Analysis
  code-security:
    name: 🔍 Code Security Analysis
    runs-on: ubuntu-latest
    outputs:
      vulnerabilities-found: ${{ steps.security.outputs.vulnerabilities }}
      high-severity: ${{ steps.security.outputs.high }}
      critical-severity: ${{ steps.security.outputs.critical }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          languages: javascript
          queries: security-extended,security-and-quality

      - name: 🔍 Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/javascript
            p/typescript
          generate-sarif: true
          publish-sarif: true

      - name: 🔍 Snyk Code Security
        id: snyk-code
        continue-on-error: true
        run: |
          # Install Snyk
          npm install -g snyk

          # Run Snyk code analysis
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            snyk auth ${{ secrets.SNYK_TOKEN }}
            snyk code test --json > snyk-code-results.json || true
            snyk code test --sarif-file-output=snyk-code.sarif || true
          fi

          # Process results
          if [ -f snyk-code-results.json ]; then
            VULNS=$(cat snyk-code-results.json | jq '.vulnerabilities | length // 0')
            HIGH=$(cat snyk-code-results.json | jq '.vulnerabilities[] | select(.severity == "high") | length' | wc -l)
            CRITICAL=$(cat snyk-code-results.json | jq '.vulnerabilities[] | select(.severity == "critical") | length' | wc -l)

            echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT
            echo "high=$HIGH" >> $GITHUB_OUTPUT
            echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          else
            echo "vulnerabilities=0" >> $GITHUB_OUTPUT
            echo "high=0" >> $GITHUB_OUTPUT
            echo "critical=0" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Security Pattern Analysis
        id: security
        run: |
          echo "## 🔍 Code Security Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Scan for security anti-patterns
          SECURITY_ISSUES=0
          HIGH_SEVERITY=0
          CRITICAL_SEVERITY=0

          echo "### 🔍 Security Issues Found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for hardcoded secrets
          if grep -r -E "(password|secret|key|token)\s*=\s*['\"][^'\"]{8,}" src/ 2>/dev/null; then
            echo "🚨 **Hardcoded secrets found**" >> $GITHUB_STEP_SUMMARY
            ((CRITICAL_SEVERITY++))
            ((SECURITY_ISSUES++))
          fi

          # Check for SQL injection patterns
          if grep -r -E "(\+.*\+|concat)\s*.*\$\{.*\}" src/ 2>/dev/null; then
            echo "⚠️ **Potential SQL injection patterns**" >> $GITHUB_STEP_SUMMARY
            ((HIGH_SEVERITY++))
            ((SECURITY_ISSUES++))
          fi

          # Check for eval usage
          if grep -r "eval(" src/ 2>/dev/null; then
            echo "⚠️ **Eval usage detected**" >> $GITHUB_STEP_SUMMARY
            ((HIGH_SEVERITY++))
            ((SECURITY_ISSUES++))
          fi

          # Check for unsafe regex
          if grep -r -E "RegExp\([^)]*\+[^)]*\)" src/ 2>/dev/null; then
            echo "⚠️ **Potentially unsafe regular expressions**" >> $GITHUB_STEP_SUMMARY
            ((SECURITY_ISSUES++))
          fi

          # Check for insecure HTTP usage
          if grep -r "http://" src/ 2>/dev/null; then
            echo "⚠️ **Insecure HTTP URLs found**" >> $GITHUB_STEP_SUMMARY
            ((SECURITY_ISSUES++))
          fi

          # Check for console.log in production code
          if grep -r "console\.log" src/ 2>/dev/null; then
            echo "ℹ️ **Debug console statements found**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "vulnerabilities=$SECURITY_ISSUES" >> $GITHUB_OUTPUT
          echo "high=$HIGH_SEVERITY" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL_SEVERITY" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | $CRITICAL_SEVERITY |" >> $GITHUB_STEP_SUMMARY
          echo "| High | $HIGH_SEVERITY |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Issues | $SECURITY_ISSUES |" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Security Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            snyk-code-results.json
            snyk-code.sarif
            semgrep.sarif
          retention-days: 30

  # Dependency Security Analysis
  dependency-security:
    name: 📦 Dependency Security
    runs-on: ubuntu-latest
    outputs:
      vulnerabilities: ${{ steps.deps.outputs.vulnerabilities }}
      outdated: ${{ steps.deps.outputs.outdated }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 npm Audit
        id: audit
        run: |
          npm audit --json > npm-audit.json || true
          npm audit --audit-level=moderate > npm-audit-report.txt || true

          # Process audit results
          if [ -f npm-audit.json ]; then
            VULNS=$(cat npm-audit.json | jq -r '.metadata.vulnerabilities.total // 0')
            echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT
          else
            echo "vulnerabilities=0" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Snyk Dependency Scan
        id: snyk-deps
        continue-on-error: true
        run: |
          npm install -g snyk

          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            snyk auth ${{ secrets.SNYK_TOKEN }}
            snyk test --json > snyk-deps-results.json || true
            snyk monitor --org=${{ secrets.SNYK_ORG }} --project-name=haseb || true
          fi

          if [ -f snyk-deps-results.json ]; then
            VULNS=$(cat snyk-deps-results.json | jq '.vulnerabilities | length // 0')
            echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT
          else
            echo "vulnerabilities=0" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Outdated Dependencies
        id: outdated
        run: |
          npm outdated --json > npm-outdated.json || true

          if [ -f npm-outdated.json ]; then
            OUTDATED=$(cat npm-outdated.json | jq 'keys | length // 0')
            echo "outdated=$OUTDATED" >> $GITHUB_OUTPUT
          else
            echo "outdated=0" >> $GITHUB_OUTPUT
          fi

      - name: 📊 Dependency Security Summary
        id: deps
        run: |
          echo "## 📦 Dependency Security Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # npm audit results
          if [ -f npm-audit.json ]; then
            HIGH=$(cat npm-audit.json | jq -r '.metadata.vulnerabilities.high // 0')
            MODERATE=$(cat npm-audit.json | jq -r '.metadata.vulnerabilities.moderate // 0')
            LOW=$(cat npm-audit.json | jq -r '.metadata.vulnerabilities.low // 0')
            TOTAL=$(cat npm-audit.json | jq -r '.metadata.vulnerabilities.total // 0')

            echo "### npm Audit Results" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| Moderate | $MODERATE |" >> $GITHUB_STEP_SUMMARY
            echo "| Low | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Snyk results
          if [ -f snyk-deps-results.json ]; then
            SNYK_VULNS=$(cat snyk-deps-results.json | jq '.vulnerabilities | length // 0')
            echo "### Snyk Results" >> $GITHUB_STEP_SUMMARY
            echo "- Vulnerabilities found: $SNYK_VULNS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Outdated packages
          if [ -f npm-outdated.json ]; then
            OUTDATED_COUNT=$(cat npm-outdated.json | jq 'keys | length // 0')
            echo "### Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
            echo "- Outdated packages: $OUTDATED_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          TOTAL_VULNS=$((${{ steps.audit.outputs.vulnerabilities }} + ${{ steps.snyk-deps.outputs.vulnerabilities }}))
          echo "vulnerabilities=$TOTAL_VULNS" >> $GITHUB_OUTPUT
          echo "outdated=${{ steps.outdated.outputs.outdated }}" >> $GITHUB_OUTPUT

      - name: 📤 Upload Dependency Reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-security
          path: |
            npm-audit.json
            npm-audit-report.txt
            snyk-deps-results.json
            npm-outdated.json
          retention-days: 30

  # Container Security Analysis
  container-security:
    name: 🐳 Container Security
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile') != ''

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Dockerfile Security Scan
        run: |
          echo "## 🐳 Dockerfile Security Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for security issues in Dockerfile
          ISSUES=0

          if [ -f Dockerfile ]; then
            # Check for root user
            if grep -q "USER root" Dockerfile; then
              echo "⚠️ **Running as root user**" >> $GITHUB_STEP_SUMMARY
              ((ISSUES++))
            fi

            # Check for sensitive data
            if grep -E "(password|secret|key|token)" Dockerfile; then
              echo "🚨 **Potential secrets in Dockerfile**" >> $GITHUB_STEP_SUMMARY
              ((ISSUES++))
            fi

            # Check for latest tag
            if grep -E "FROM.*:latest" Dockerfile; then
              echo "⚠️ **Using latest tag in FROM**" >> $GITHUB_STEP_SUMMARY
              ((ISSUES++))
            fi

            # Check for curl/wget without verification
            if grep -E "(curl|wget).*http://" Dockerfile; then
              echo "⚠️ **Insecure download without verification**" >> $GITHUB_STEP_SUMMARY
              ((ISSUES++))
            fi

            echo "Security issues found: $ISSUES" >> $GITHUB_STEP_SUMMARY
          else
            echo "No Dockerfile found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🔍 Trivy Container Scan
        id: trivy
        continue-on-error: true
        run: |
          # Install Trivy
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy

          # Build image if it doesn't exist
          if ! docker images | grep haseb; then
            docker build -t haseb:latest .
          fi

          # Run Trivy scan
          trivy image --format json --output trivy-results.json haseb:latest || true
          trivy image --format table --exit-code 1 haseb:latest || true

          # Process results
          if [ -f trivy-results.json ]; then
            VULNS=$(cat trivy-results.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity != "UNKNOWN")] | length')
            CRITICAL=$(cat trivy-results.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length')
            HIGH=$(cat trivy-results.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length')

            echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT
            echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
            echo "high=$HIGH" >> $GITHUB_OUTPUT

            echo "### 🐳 Container Vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
            echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| Total | $VULNS |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload Container Security Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container-security
          path: trivy-results.json
          retention-days: 30

  # Infrastructure Security
  infrastructure-security:
    name: 🏗️ Infrastructure Security
    runs-on: ubuntu-latest
    if: hashFiles('terraform/**') != '' || hashFiles('k8s/**') != ''

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Terraform Security Scan
        if: hashFiles('terraform/**') != ''
        run: |
          echo "## 🏗️ Terraform Security Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Install Terraform
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo apt-key add -
          sudo apt-add-repository "deb [arch=amd64] https://apt.releases.hashicorp.com $(lsb_release -cs) main"
          sudo apt-get update && sudo apt-get install terraform

          # Install tfsec
          wget https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64
          chmod +x tfsec-linux-amd64
          sudo mv tfsec-linux-amd64 /usr/local/bin/tfsec

          # Run security scan
          cd terraform
          tfsec --format=json --out=../tfsec-results.json || true
          tfsec --format=table || true

          if [ -f ../tfsec-results.json ]; then
            ISSUES=$(cat ../tfsec-results.json | jq '.results | length')
            echo "Security issues found: $ISSUES" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🔍 Kubernetes Security Scan
        if: hashFiles('k8s/**') != ''
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ☸️ Kubernetes Security Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Install kube-score
          wget https://github.com/zegl/kube-score/releases/download/v1.13.1/kube-score_1.13.1_linux_amd64.tar.gz
          tar xzf kube-score_1.13.1_linux_amd64.tar.gz

          # Run security scan
          ./kube-score score k8s/*.yaml --output-format=json --output-file=kube-score-results.json || true
          ./kube-score score k8s/*.yaml --output-format=ci || true

      - name: 📤 Upload Infrastructure Security Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: infrastructure-security
          path: |
            tfsec-results.json
            kube-score-results.json
          retention-days: 30

  # Web Application Security
  web-security:
    name: 🌐 Web Application Security
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build Application
        run: npm run build

      - name: 🚀 Start Application
        run: |
          npm run dev &
          sleep 15
        env:
          NODE_ENV: test

      - name: 🔍 OWASP ZAP Baseline Scan
        id: zap
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: 🔍 Nikto Web Scanner
        continue-on-error: true
        run: |
          # Install Nikto
          sudo apt-get update
          sudo apt-get install -y nikto

          # Run Nikto scan
          nikto -h http://localhost:3000 -Format json -o nikto-results.json || true

      - name: 📊 Web Security Summary
        run: |
          echo "## 🌐 Web Application Security" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f zap-results.json ]; then
            ALERTS=$(cat zap-results.json | jq '.site[].alerts | length')
            HIGH=$(cat zap-results.json | jq '.site[].alerts[] | select(.risk == "High") | length' | wc -l)
            echo "- OWASP ZAP alerts: $ALERTS" >> $GITHUB_STEP_SUMMARY
            echo "- High risk: $HIGH" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f nikto-results.json ]; then
            NIKTO_ISSUES=$(cat nikto-results.json | jq '.vulnerabilities | length')
            echo "- Nikto issues: $NIKTO_ISSUES" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload Web Security Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-security
          path: |
            zap-results.json
            nikto-results.json
          retention-days: 30

  # Security Score Calculation
  security-score:
    name: 📊 Security Score
    runs-on: ubuntu-latest
    needs: [code-security, dependency-security, container-security, infrastructure-security, web-security]
    outputs:
      overall-score: ${{ steps.score.outputs.overall }}
      security-grade: ${{ steps.score.outputs.grade }}

    steps:
      - name: 📊 Calculate Security Score
        id: score
        run: |
          # Base score starts at 100
          SCORE=100

          # Deduct points for issues
          CODE_VULNS=${{ needs.code-security.outputs.vulnerabilities-found }}
          DEPS_VULNS=${{ needs.dependency-security.outputs.vulnerabilities }}
          HIGH_CRIT=${{ needs.code-security.outputs.high-severity }}
          CRIT_CRIT=${{ needs.code-security.outputs.critical-severity }}

          # Deductions
          SCORE=$((SCORE - CODE_VULNS * 2))
          SCORE=$((SCORE - DEPS_VULNS))
          SCORE=$((SCORE - HIGH_CRIT * 5))
          SCORE=$((SCORE - CRIT_CRIT * 10))

          # Ensure score doesn't go below 0
          if [ $SCORE -lt 0 ]; then
            SCORE=0
          fi

          # Determine grade
          if [ $SCORE -ge 90 ]; then
            GRADE="A+"
          elif [ $SCORE -ge 80 ]; then
            GRADE="A"
          elif [ $SCORE -ge 70 ]; then
            GRADE="B"
          elif [ $SCORE -ge 60 ]; then
            GRADE="C"
          elif [ $SCORE -ge 50 ]; then
            GRADE="D"
          else
            GRADE="F"
          fi

          echo "overall=$SCORE" >> $GITHUB_OUTPUT
          echo "grade=$GRADE" >> $GITHUB_OUTPUT

          echo "## 📊 Security Score" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Overall Security Grade: $GRADE" >> $GITHUB_STEP_SUMMARY
          echo "**Score: $SCORE/100**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Scoring Breakdown" >> $GITHUB_STEP_SUMMARY
          echo "- Base score: 100" >> $GITHUB_STEP_SUMMARY
          echo "- Code vulnerabilities: -$((CODE_VULNS * 2))" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency vulnerabilities: -$DEPS_VULNS" >> $GITHUB_STEP_SUMMARY
          echo "- High severity issues: -$((HIGH_CRIT * 5))" >> $GITHUB_STEP_SUMMARY
          echo "- Critical issues: -$((CRIT_CRIT * 10))" >> $GITHUB_STEP_SUMMARY
          echo "- **Final score: $SCORE**" >> $GITHUB_STEP_SUMMARY

  # Security Gates
  security-gates:
    name: 🚪 Security Gates
    runs-on: ubuntu-latest
    needs: [code-security, dependency-security, security-score]
    if: github.event_name == 'pull_request'

    steps:
      - name: 🚪 Check Security Gates
        run: |
          echo "## 🚪 Security Gates Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CRITICAL_ISSUES=${{ needs.code-security.outputs.critical-severity }}
          SECURITY_SCORE=${{ needs.security-score.outputs.overall-score }}

          # Critical issues gate
          if [ "$CRITICAL_ISSUES" -gt 0 ]; then
            echo "❌ **Critical Issues Gate: FAILED** ($CRITICAL_ISSUES critical issues)" >> $GITHUB_STEP_SUMMARY
            echo "Critical issues must be resolved before merging." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **Critical Issues Gate: PASSED**" >> $GITHUB_STEP_SUMMARY
          fi

          # Security score gate
          if [ "$SECURITY_SCORE" -lt 70 ]; then
            echo "❌ **Security Score Gate: FAILED** (Score: $SECURITY_SCORE/100)" >> $GITHUB_STEP_SUMMARY
            echo "Security score must be at least 70/100." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **Security Score Gate: PASSED** (Score: $SECURITY_SCORE/100)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **All security gates passed!** Ready for merge." >> $GITHUB_STEP_SUMMARY

  # Security Notification
  security-notification:
    name: 📧 Security Notification
    runs-on: ubuntu-latest
    needs: [code-security, dependency-security, security-score]
    if: always() && (needs.code-security.result == 'failure' || needs.dependency-security.result == 'failure')

    steps:
      - name: 📧 Send Security Alert
        uses: 8398a7/action-slack@v3
        with:
          status: warning
          channel: '#security'
          text: |
            🔒 **Security Issues Detected**
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            📊 Security Score: ${{ needs.security-score.outputs.overall-score }}/100 (${{ needs.security-score.outputs.security-grade }})
            🚨 Critical Issues: ${{ needs.code-security.outputs.critical-severity }}
            ⚠️ High Severity: ${{ needs.code-security.outputs.high-severity }}
            📦 Dependency Vulnerabilities: ${{ needs.dependency-security.outputs.vulnerabilities }}

            Please review and address security concerns.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Security Summary
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [code-security, dependency-security, container-security, infrastructure-security, web-security, security-score]
    if: always()

    steps:
      - name: 📊 Generate Security Summary
        run: |
          echo "## 🔒 HASEB Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Security Check | Status | Score |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Code Security | ${{ needs.code-security.result }} | ${{ needs.security-score.outputs.overall-score }}/100 |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Dependencies | ${{ needs.dependency-security.result }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Container | ${{ needs.container-security.result }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Infrastructure | ${{ needs.infrastructure-security.result }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Web Application | ${{ needs.web-security.result }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🎯 Overall Security Grade: ${{ needs.security-score.outputs.security-grade }}" >> $GITHUB_STEP_SUMMARY
          echo "**Score: ${{ needs.security-score.outputs.overall-score }}/100**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.security-score.outputs.overall-score }}" -ge 80 ]]; then
            echo "🛡️ **Excellent security posture!**" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.security-score.outputs.overall-score }}" -ge 70 ]]; then
            echo "✅ **Good security posture.** Some improvements recommended." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Security improvements needed.** Review and address critical issues." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Security Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [OWASP Top 10](https://owasp.org/www-project-top-ten/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Security Guidelines](https://github.com/${{ github.repository }}/security/policy)" >> $GITHUB_STEP_SUMMARY
          echo "- [Report Vulnerability](https://github.com/${{ github.repository }}/security/advisories/new)" >> $GITHUB_STEP_SUMMARY