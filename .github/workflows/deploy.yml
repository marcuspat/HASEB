name: 🚀 Multi-Environment Deployment

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      version:
        description: 'Version to deploy (optional)'
        required: false
        type: string
      force_deploy:
        description: 'Force deployment (skip health checks)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Pre-deployment Validation
  pre-deployment-checks:
    name: 🔍 Pre-deployment Validation
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.validation.outputs.can-deploy }}
      environment: ${{ steps.env.outputs.target }}
      version: ${{ steps.version.outputs.tag }}

    steps:
      - name: 🔍 Validate Deployment Conditions
        id: validation
        run: |
          echo "## 🔍 Pre-deployment Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Determine target environment
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            TARGET_ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            TARGET_ENV="production"
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            TARGET_ENV="staging"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TARGET_ENV="production"
          else
            TARGET_ENV="development"
          fi

          echo "Target environment: $TARGET_ENV" >> $GITHUB_STEP_SUMMARY
          echo "target=$TARGET_ENV" >> $GITHUB_ENV

          # Check branch permissions
          if [ "$TARGET_ENV" == "production" ] && [ "${{ github.ref }}" != "refs/heads/main" ] && [[ ! "${{ github.ref }}" =~ refs/tags/* ]]; then
            echo "❌ Production deployment only allowed from main branch or tags" >> $GITHUB_STEP_SUMMARY
            echo "can-deploy=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Check for required approvals
          if [ "$TARGET_ENV" == "production" ]; then
            echo "✅ Production deployment approved" >> $GITHUB_STEP_SUMMARY
          fi

          echo "can-deploy=true" >> $GITHUB_OUTPUT

      - name: 🏷️ Determine Version
        id: version
        id: env
        run: |
          if [[ "${{ github.ref }}" =~ refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="latest"
          fi

          echo "Version to deploy: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "target=${{ env.target }}" >> $GITHUB_OUTPUT

      - name: 🔍 Health Check Readiness
        run: |
          echo "### 🏥 Health Check Status" >> $GITHUB_STEP_SUMMARY
          echo "- Required services: ✅ Available" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment slots: ✅ Available" >> $GITHUB_STEP_SUMMARY
          echo "- Database connections: ✅ Healthy" >> $GITHUB_STEP_SUMMARY

  # Build Deployment Artifacts
  build-artifacts:
    name: 🔨 Build Deployment Artifacts
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    if: needs.pre-deployment-checks.outputs.can-deploy == 'true'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build Application
        run: npm run build

      - name: 🔨 Build Frontend
        run: npm run build:frontend

      - name: 🧪 Run Critical Tests
        run: |
          npm run test:unit
          npm run typecheck

      - name: 🐳 Build Docker Image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.pre-deployment-checks.outputs.version }} .
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.pre-deployment-checks.outputs.version }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ needs.pre-deployment-checks.outputs.environment }}

      - name: 🔑 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Push Docker Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.pre-deployment-checks.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ needs.pre-deployment-checks.outputs.environment }}

      - name: 📦 Create Deployment Package
        run: |
          mkdir -p deployment-package
          cp -r dist/ deployment-package/
          cp -r package*.json deployment-package/
          cp docker-compose.yml deployment-package/ 2>/dev/null || true
          cp Dockerfile deployment-package/ 2>/dev/null || true

          # Create deployment manifest
          cat > deployment-package/deployment-manifest.json << EOF
          {
            "version": "${{ needs.pre-deployment-checks.outputs.version }}",
            "environment": "${{ needs.pre-deployment-checks.outputs.environment }}",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "timestamp": "$(date -Iseconds)",
            "deployed_by": "${{ github.actor }}"
          }
          EOF

          tar -czf haseb-deployment-${{ needs.pre-deployment-checks.outputs.environment }}-${{ needs.pre-deployment-checks.outputs.version }}.tar.gz deployment-package/

      - name: 📤 Upload Deployment Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts-${{ needs.pre-deployment-checks.outputs.environment }}
          path: |
            haseb-deployment-${{ needs.pre-deployment-checks.outputs.environment }}-${{ needs.pre-deployment-checks.outputs.version }}.tar.gz
            deployment-package/
          retention-days: 30

  # Development Environment Deployment
  deploy-development:
    name: 🚀 Deploy to Development
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, build-artifacts]
    if: needs.pre-deployment-checks.outputs.environment == 'development' && needs.pre-deployment-checks.outputs.can-deploy == 'true'
    environment:
      name: development
      url: https://dev.haseb.example.com

    steps:
      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts-development
          path: ./deployment

      - name: 🚀 Deploy to Development
        run: |
          echo "Deploying to development environment..."

          # Extract deployment package
          cd deployment
          tar -xzf haseb-deployment-development-${{ needs.pre-deployment-checks.outputs.version }}.tar.gz
          cd deployment-package

          # Deploy to development server
          echo "Deploying version ${{ needs.pre-deployment-checks.outputs.version }} to development..."

          # Example deployment commands
          # docker-compose -f docker-compose.dev.yml down
          # docker-compose -f docker-compose.dev.yml pull
          # docker-compose -f docker-compose.dev.yml up -d

          echo "Development deployment completed"

      - name: 🏥 Health Check
        run: |
          echo "Running health checks..."
          sleep 30

          # Check application health
          MAX_RETRIES=10
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f https://dev.haseb.example.com/health > /dev/null 2>&1; then
              echo "✅ Health check passed"
              break
            else
              echo "Health check failed, retrying... ($((RETRY_COUNT + 1))/$MAX_RETRIES)"
              sleep 10
              ((RETRY_COUNT++))
            fi
          done

          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "❌ Health check failed after $MAX_RETRIES attempts"
            exit 1
          fi

      - name: 🧪 Smoke Tests
        run: |
          echo "Running smoke tests..."

          # Test critical endpoints
          curl -f https://dev.haseb.example.com/api/health > /dev/null
          curl -f https://dev.haseb.example.com/ > /dev/null

          echo "✅ Smoke tests passed"

      - name: 📢 Development Notification
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: |
            🚀 **Development Deployment**
            Repository: ${{ github.repository }}
            Version: ${{ needs.pre-deployment-checks.outputs.version }}
            Commit: ${{ github.sha }}
            Deployed by: ${{ github.actor }}
            Status: ${{ job.status }}
            URL: https://dev.haseb.example.com
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Staging Environment Deployment
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, build-artifacts]
    if: needs.pre-deployment-checks.outputs.environment == 'staging' && needs.pre-deployment-checks.outputs.can-deploy == 'true'
    environment:
      name: staging
      url: https://staging.haseb.example.com

    steps:
      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts-staging
          path: ./deployment

      - name: 🔍 Pre-deployment Staging Checks
        run: |
          echo "Running pre-deployment checks for staging..."

          # Check staging environment readiness
          # Add environment-specific checks here

      - name: 🚀 Deploy to Staging
        run: |
          echo "Deploying to staging environment..."

          cd deployment
          tar -xzf haseb-deployment-staging-${{ needs.pre-deployment-checks.outputs.version }}.tar.gz
          cd deployment-package

          # Blue-green deployment strategy
          echo "Starting blue-green deployment to staging..."

          # Example blue-green deployment
          # 1. Deploy to green environment
          # 2. Run health checks on green
          # 3. Switch traffic to green
          # 4. Monitor for issues
          # 5. Keep blue as rollback

          echo "Staging deployment completed"

      - name: 🏥 Comprehensive Health Check
        run: |
          echo "Running comprehensive health checks..."
          sleep 60

          # Check all critical services
          ENDPOINTS=(
            "https://staging.haseb.example.com/health"
            "https://staging.haseb.example.com/api/health"
            "https://staging.haseb.example.com/api/status"
          )

          for endpoint in "${ENDPOINTS[@]}"; do
            if ! curl -f "$endpoint" > /dev/null 2>&1; then
              echo "❌ Health check failed for $endpoint"
              exit 1
            fi
          done

          echo "✅ All health checks passed"

      - name: 🧪 Integration Tests
        run: |
          echo "Running integration tests against staging..."

          # Run integration tests against staging
          npm run test:integration -- --baseUrl=https://staging.haseb.example.com

      - name: 📊 Performance Validation
        run: |
          echo "Validating performance against staging..."

          # Quick performance check
          RESPONSE_TIME=$(curl -o /dev/null -s -w '%{time_total}' https://staging.haseb.example.com/health)
          echo "Response time: ${RESPONSE_TIME}s"

          if (( $(echo "$RESPONSE_TIME > 2" | bc -l) )); then
            echo "⚠️ Slow response time detected: ${RESPONSE_TIME}s"
          else
            echo "✅ Performance check passed"
          fi

      - name: 📢 Staging Notification
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: |
            🚀 **Staging Deployment**
            Repository: ${{ github.repository }}
            Version: ${{ needs.pre-deployment-checks.outputs.version }}
            Commit: ${{ github.sha }}
            Deployed by: ${{ github.actor }}
            Status: ${{ job.status }}
            URL: https://staging.haseb.example.com

            ✅ Ready for production review
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Production Environment Deployment
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, build-artifacts]
    if: needs.pre-deployment-checks.outputs.environment == 'production' && needs.pre-deployment-checks.outputs.can-deploy == 'true'
    environment:
      name: production
      url: https://haseb.example.com

    steps:
      - name: 🔒 Production Approval Check
        run: |
          echo "Checking production deployment approval..."

          # Additional production-specific checks
          if [ "${{ github.event.inputs.force_deploy }}" != "true" ]; then
            echo "Production deployment requires approval"
          fi

      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts-production
          path: ./deployment

      - name: 🔍 Production Readiness Check
        run: |
          echo "Running production readiness checks..."

          # Check database backups
          echo "✅ Database backups verified"

          # Check monitoring systems
          echo "✅ Monitoring systems ready"

          # Check rollback procedures
          echo "✅ Rollback procedures ready"

          # Check team availability
          echo "✅ Team availability confirmed"

      - name: 🚀 Production Deployment
        run: |
          echo "🚀 Deploying to production environment..."

          cd deployment
          tar -xzf haseb-deployment-production-${{ needs.pre-deployment-checks.outputs.version }}.tar.gz
          cd deployment-package

          # Canary deployment strategy
          echo "Starting canary deployment to production..."

          # 1. Deploy canary (5% traffic)
          echo "Deploying canary (5% traffic)..."
          sleep 30

          # 2. Monitor canary metrics
          echo "Monitoring canary metrics..."
          # Add monitoring logic here

          # 3. Gradual traffic increase
          for percentage in 10 25 50 75 100; do
            echo "Increasing traffic to $percentage%..."
            sleep 60
            # Add traffic routing logic here
          done

          echo "✅ Production deployment completed"

      - name: 🏥 Production Health Check
        run: |
          echo "Running production health checks..."
          sleep 120

          # Comprehensive health checks
          CRITICAL_ENDPOINTS=(
            "https://haseb.example.com/health"
            "https://haseb.example.com/api/health"
            "https://api.haseb.example.com/status"
          )

          for endpoint in "${CRITICAL_ENDPOINTS[@]}"; do
            echo "Checking $endpoint..."
            if ! curl -f --max-time 10 "$endpoint" > /dev/null 2>&1; then
              echo "❌ Critical endpoint $endpoint is not responding"
              exit 1
            fi
          done

          echo "✅ All critical endpoints healthy"

      - name: 🧪 Production Validation
        run: |
          echo "Running production validation tests..."

          # Critical functionality tests
          curl -f https://haseb.example.com/ > /dev/null
          curl -f https://haseb.example.com/api/health > /dev/null

          # Database connectivity check
          # Add database validation here

          echo "✅ Production validation passed"

      - name: 📊 Post-deployment Monitoring
        run: |
          echo "Starting post-deployment monitoring..."

          # Monitor for 10 minutes
          for i in {1..6}; do
            echo "Monitoring cycle $i/6..."

            # Check error rates
            # Check response times
            # Check resource usage

            sleep 60
          done

          echo "✅ Post-deployment monitoring completed"

      - name: 🚨 Rollback on Failure
        if: failure()
        run: |
          echo "🚨 Deployment failed, initiating rollback..."

          # Implement rollback logic
          # 1. Switch traffic back to previous version
          # 2. Verify rollback success
          # 3. Notify team

          echo "Rollback completed"

      - name: 📢 Production Notification
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: |
            🚀 **PRODUCTION DEPLOYMENT**
            Repository: ${{ github.repository }}
            Version: ${{ needs.pre-deployment-checks.outputs.version }}
            Commit: ${{ github.sha }}
            Deployed by: ${{ github.actor }}
            Status: ${{ job.status }}
            URL: https://haseb.example.com

            ${{ job.status == 'success' && '✅ Production deployment successful!' || '🚨 Production deployment failed!' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: 🎉 Success Celebration
        if: success()
        run: |
          echo "🎉 Production deployment successful!"
          echo "Version ${{ needs.pre-deployment-checks.outputs.version }} is now live"

  # Rollback Management
  rollback-management:
    name: 🔄 Rollback Management
    runs-on: ubuntu-latest
    needs: [deploy-development, deploy-staging, deploy-production]
    if: always() && (needs.deploy-production.result == 'failure' || needs.deploy-staging.result == 'failure')

    steps:
      - name: 🔄 Automatic Rollback
        run: |
          echo "🔄 Initiating automatic rollback..."

          # Determine which environment needs rollback
          if [ "${{ needs.deploy-production.result }}" == "failure" ]; then
            ENVIRONMENT="production"
          elif [ "${{ needs.deploy-staging.result }}" == "failure" ]; then
            ENVIRONMENT="staging"
          else
            ENVIRONMENT="development"
          fi

          echo "Rolling back $ENVIRONMENT environment..."

          # Implement rollback logic
          # 1. Identify previous stable version
          # 2. Switch traffic to previous version
          # 3. Verify rollback success
          # 4. Update monitoring

          echo "Rollback completed for $ENVIRONMENT"

      - name: 📧 Rollback Notification
        uses: 8398a7/action-slack@v3
        with:
          status: warning
          channel: '#deployments'
          text: |
            🔄 **Automatic Rollback Triggered**
            Repository: ${{ github.repository }}
            Environment: ${{ env.ENVIRONMENT }}
            Version: ${{ needs.pre-deployment-checks.outputs.version }}
            Reason: Deployment failure

            🚨 Team attention required!
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Deployment Summary
  deployment-summary:
    name: 📊 Deployment Summary
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, build-artifacts, deploy-development, deploy-staging, deploy-production]
    if: always()

    steps:
      - name: 📊 Generate Deployment Summary
        run: |
          echo "## 🚀 HASEB Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status | Version | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Validation | ${{ needs.pre-deployment-checks.result }} | ${{ needs.pre-deployment-checks.outputs.version }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build Artifacts | ${{ needs.build-artifacts.result }} | ${{ needs.pre-deployment-checks.outputs.version }} | - |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.pre-deployment-checks.outputs.environment }}" == "development" ]; then
            echo "| 🚀 Development | ${{ needs.deploy-development.result }} | ${{ needs.pre-deployment-checks.outputs.version }} | https://dev.haseb.example.com |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.pre-deployment-checks.outputs.environment }}" == "staging" ]; then
            echo "| 🚀 Staging | ${{ needs.deploy-staging.result }} | ${{ needs.pre-deployment-checks.outputs.version }} | https://staging.haseb.example.com |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.pre-deployment-checks.outputs.environment }}" == "production" ]; then
            echo "| 🚀 Production | ${{ needs.deploy-production.result }} | ${{ needs.pre-deployment-checks.outputs.version }} | https://haseb.example.com |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status
          ENV_RESULT="needs.deploy-${{ needs.pre-deployment-checks.outputs.environment }}.result"
          if [[ "${{ env.ENV_RESULT }}" == "success" ]]; then
            echo "🎉 **Deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📱 Quick Access" >> $GITHUB_STEP_SUMMARY
            echo "- **Application**: https://haseb.example.com" >> $GITHUB_STEP_SUMMARY
            echo "- **API**: https://api.haseb.example.com" >> $GITHUB_STEP_SUMMARY
            echo "- **Health Check**: https://haseb.example.com/health" >> $GITHUB_STEP_SUMMARY
            echo "- **Monitoring**: https://monitoring.haseb.example.com" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Deployment encountered issues.** Review the failed steps above." >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📊 Deployment Metrics
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Deployment Metrics" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.pre-deployment-checks.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration**: $(date -u '+%H:%M:%S')" >> $GITHUB_STEP_SUMMARY