name: 🧪 Testing Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run tests daily at 4 AM UTC
    - cron: '0 4 * * *'

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/haseb_test

jobs:
  # Unit Tests
  unit-tests:
    name: 🔬 Unit Tests
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.lines }}
      tests-passed: ${{ steps.test.outputs.passed }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build Project
        run: npm run build

      - name: 🔬 Run Unit Tests
        id: test
        run: |
          npm run test:unit -- --coverage --coverageReporters=json --coverageReporters=text --coverageReporters=lcov --verbose
          echo "passed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: 📊 Coverage Report
        id: coverage
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct // 0')
            FUNCTIONS=$(cat coverage/coverage-summary.json | jq -r '.total.functions.pct // 0')
            BRANCHES=$(cat coverage/coverage-summary.json | jq -r '.total.branches.pct // 0')
            STATEMENTS=$(cat coverage/coverage-summary.json | jq -r '.total.statements.pct // 0')

            echo "lines=$LINES" >> $GITHUB_OUTPUT
            echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
            echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
            echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT

            echo "## 📊 Unit Test Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| Lines | $LINES% |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | $FUNCTIONS% |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | $BRANCHES% |" >> $GITHUB_STEP_SUMMARY
            echo "| Statements | $STATEMENTS% |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            coverage/
            junit.xml
            test-results/
          retention-days: 30

  # Integration Tests
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: haseb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build Project
        run: npm run build

      - name: 🗄️ Setup Test Database
        run: |
          npm run migrate
          npm run seed:test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: 🔗 Run Integration Tests
        run: |
          npm run test:integration -- --verbose --detectOpenHandles --forceExit
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        continue-on-error: true

      - name: 📊 Integration Test Summary
        run: |
          echo "## 🔗 Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Database connectivity tests" >> $GITHUB_STEP_SUMMARY
          echo "- API endpoint integration tests" >> $GITHUB_STEP_SUMMARY
          echo "- Service layer integration tests" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            test-results/
            coverage/
            logs/
          retention-days: 30

  # E2E Tests with Playwright
  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1/3, 2/3, 3/3]
        fail-fast: false

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: 🔨 Build Frontend
        run: npm run build:frontend

      - name: 🗄️ Setup Test Database
        run: |
          npm run migrate
          npm run seed:test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: 🚀 Start Application
        run: |
          npm run dev &
          sleep 20
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: 🔍 Health Check
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3000/health; do sleep 2; done'

      - name: 🎭 Run E2E Tests
        run: npx playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shard }}
        env:
          BASE_URL: http://localhost:3000
          CI: true
        continue-on-error: true

      - name: 📸 Archive Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-screenshots-${{ matrix.browser }}-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

      - name: 🎬 Archive Videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-videos-${{ matrix.browser }}-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

      - name: 📊 E2E Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Test Results (${{ matrix.browser }}, Shard ${{ matrix.shard }})
          path: playwright-report/results.xml
          reporter: java-junit

  # Performance Tests
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build Project
        run: npm run build

      - name: 🗄️ Setup Test Database
        run: |
          npm run migrate
          npm run seed:test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: ⚡ Run Performance Tests
        run: npm run test:performance -- --verbose
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ env.DATABASE_URL }}
        continue-on-error: true

      - name: 📊 Performance Benchmark
        run: |
          echo "## ⚡ Performance Benchmarks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- API response time benchmarks" >> $GITHUB_STEP_SUMMARY
          echo "- Database query performance" >> $GITHUB_STEP_SUMMARY
          echo "- Memory usage analysis" >> $GITHUB_STEP_SUMMARY
          echo "- Load testing results" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Performance Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-results
          path: |
            performance-results/
            test-results/
            benchmarks/
          retention-days: 30

  # Security Tests
  security-tests:
    name: 🔒 Security Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔒 Run Security Tests
        run: npm run test:security -- --verbose
        continue-on-error: true

      - name: 🔍 OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
        continue-on-error: true

      - name: 📤 Upload Security Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: |
            security-test-results/
            zap-results/
          retention-days: 30

  # Accessibility Tests
  accessibility-tests:
    name: ♿ Accessibility Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build Frontend
        run: npm run build:frontend

      - name: ♿ Install Accessibility Tools
        run: npm install -g pa11y-ci

      - name: 🚀 Start Application
        run: |
          npm run dev &
          sleep 15
        env:
          NODE_ENV: test

      - name: ♿ Run Accessibility Tests
        run: |
          pa11y-ci --sitemap http://localhost:3000/sitemap.xml --reporter json > accessibility-report.json || true
        continue-on-error: true

      - name: 📊 Accessibility Summary
        run: |
          if [ -f accessibility-report.json ]; then
            echo "## ♿ Accessibility Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat accessibility-report.json | jq -r '
              "Total Issues: \(.results | length)",
              "Errors: \(.results | map(select(.type == "error")) | length)",
              "Warnings: \(.results | map(select(.type == "warning")) | length)",
              "Notices: \(.results | map(select(.type == "notice")) | length)"
            ' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload Accessibility Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-test-results
          path: accessibility-report.json
          retention-days: 30

  # Cross-Browser Tests
  cross-browser-tests:
    name: 🌐 Cross-Browser Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chromium, firefox]
        fail-fast: false

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: 🔨 Build Frontend
        run: npm run build:frontend

      - name: 🚀 Start Application
        run: |
          npm run dev &
          sleep 20
        env:
          NODE_ENV: test

      - name: 🌐 Run Cross-Browser Tests
        run: npx playwright test --project=${{ matrix.browser }} --grep "@cross-browser"
        env:
          BASE_URL: http://localhost:3000
          CI: true
        continue-on-error: true

  # Visual Regression Tests
  visual-regression-tests:
    name: 🎨 Visual Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎨 Install Visual Testing Tools
        run: npm install -g @percy/cli

      - name: 🔨 Build Frontend
        run: npm run build:frontend

      - name: 🚀 Start Application
        run: |
          npm run dev &
          sleep 15
        env:
          NODE_ENV: test

      - name: 🎨 Run Visual Tests
        run: |
          npx playwright test --config=playwright.visual.config.ts --grep "@visual"
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          BASE_URL: http://localhost:3000
        continue-on-error: true

      - name: 📤 Upload Visual Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-test-results
          path: |
            visual-test-results/
            screenshots/
          retention-days: 30

  # Test Summary
  test-summary:
    name: 📊 Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, security-tests, accessibility-tests]
    if: always()

    steps:
      - name: 📊 Generate Test Summary
        run: |
          echo "## 🧪 HASEB Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status | Coverage | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔬 Unit Tests | ${{ needs.unit-tests.result }} | ${{ needs.unit-tests.outputs.coverage }}% | Core functionality |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Integration Tests | ${{ needs.integration-tests.result }} | - | API & Database |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 E2E Tests | ${{ needs.e2e-tests.result }} | - | Browser automation |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security Tests | ${{ needs.security-tests.result }} | - | Vulnerability scanning |" >> $GITHUB_STEP_SUMMARY
          echo "| ♿ Accessibility Tests | ${{ needs.accessibility-tests.result }} | - | WCAG compliance |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status
          if [[ "${{ needs.unit-tests.result }}" == "success" && "${{ needs.integration-tests.result }}" == "success" ]]; then
            echo "🎉 **Critical tests passed!** Ready for deployment." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some critical tests failed.** Review before deployment." >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📧 Test Results Notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#testing'
          text: |
            🧪 Test Suite Failed
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Failed Tests:
            - Unit Tests: ${{ needs.unit-tests.result }}
            - Integration Tests: ${{ needs.integration-tests.result }}
            - E2E Tests: ${{ needs.e2e-tests.result }}
            - Security Tests: ${{ needs.security-tests.result }}
            - Accessibility Tests: ${{ needs.accessibility-tests.result }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}