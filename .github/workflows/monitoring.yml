name: 📊 Monitoring & Notifications

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Monitor every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      monitor_type:
        description: 'Type of monitoring to perform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - performance
          - availability
          - security
          - custom

env:
  NODE_VERSION: '20'

jobs:
  # Application Performance Monitoring
  performance-monitoring:
    name: ⚡ Performance Monitoring
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build Application
        run: npm run build

      - name: 🚀 Start Application
        run: |
          npm run dev &
          sleep 15
        env:
          NODE_ENV: monitoring

      - name: ⚡ Lighthouse Performance Check
        run: |
          npm install -g @lhci/cli@0.12.x

          # Create Lighthouse config
          cat > lighthouserc.js << 'EOF'
          module.exports = {
            ci: {
              collect: {
                url: ['http://localhost:3000'],
                numberOfRuns: 3
              },
              assert: {
                assertions: {
                  'categories:performance': ['error', { minScore: 0.8 }],
                  'categories:accessibility': ['error', { minScore: 0.9 }],
                  'categories:best-practices': ['warn', { minScore: 0.8 }],
                  'categories:seo': ['warn', { minScore: 0.8 }]
                }
              },
              upload: {
                target: 'temporary-public-storage'
              }
            }
          };
          EOF

          lhci autorun
        continue-on-error: true

      - name: 📊 Performance Metrics Collection
        run: |
          # Create performance monitoring script
          cat > performance-monitor.js << 'EOF'
          const puppeteer = require('puppeteer');

          async function monitorPerformance() {
            const browser = await puppeteer.launch();
            const page = await browser.newPage();

            // Enable performance monitoring
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle0' });

            const metrics = await page.evaluate(() => {
              const navigation = performance.getEntriesByType('navigation')[0];
              return {
                loadTime: navigation.loadEventEnd - navigation.loadEventStart,
                domContentLoaded: navigation.domContentLoadedEventEnd - navigation.domContentLoadedEventStart,
                firstPaint: performance.getEntriesByType('paint')[0]?.startTime || 0,
                firstContentfulPaint: performance.getEntriesByType('paint')[1]?.startTime || 0
              };
            });

            console.log('Performance Metrics:', JSON.stringify(metrics, null, 2));
            await browser.close();
            return metrics;
          }

          monitorPerformance().catch(console.error);
          EOF

          node performance-monitor.js > performance-metrics.json

      - name: 📊 Performance Analysis
        run: |
          if [ -f performance-metrics.json ]; then
            echo "## ⚡ Performance Metrics" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat performance-metrics.json | jq -r '
              "| Metric | Value |",
              "|--------|-------|",
              "| Load Time | \(.loadTime)ms |",
              "| DOM Content Loaded | \(.domContentLoaded)ms |",
              "| First Paint | \(.firstPaint)ms |",
              "| First Contentful Paint | \(.firstContentfulPaint)ms |"
            ' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload Performance Data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-metrics
          path: |
            performance-metrics.json
            lighthouse-results/
          retention-days: 30

  # Availability Monitoring
  availability-monitoring:
    name: 🌍 Availability Monitoring
    runs-on: ubuntu-latest

    steps:
      - name: 🌍 Check Application Availability
        id: availability
        run: |
          # Check multiple endpoints
          ENDPOINTS=(
            "https://haseb.example.com"
            "https://api.haseb.example.com/health"
            "https://haseb.example.com/status"
          )

          TOTAL_ENDPOINTS=${#ENDPOINTS[@]}
          AVAILABLE_ENDPOINTS=0

          echo "## 🌍 Availability Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status | Response Time |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|---------------|" >> $GITHUB_STEP_SUMMARY

          for endpoint in "${ENDPOINTS[@]}"; do
            # Check endpoint availability
            start_time=$(date +%s%N)
            if curl -f -s --max-time 10 "$endpoint" > /dev/null; then
              end_time=$(date +%s%N)
              response_time=$(( (end_time - start_time) / 1000000 ))
              echo "| $endpoint | ✅ Online | ${response_time}ms |" >> $GITHUB_STEP_SUMMARY
              ((AVAILABLE_ENDPOINTS++))
            else
              echo "| $endpoint | ❌ Offline | - |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          AVAILABILITY_PERCENTAGE=$((AVAILABLE_ENDPOINTS * 100 / TOTAL_ENDPOINTS))
          echo "availability=$AVAILABILITY_PERCENTAGE" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Availability: $AVAILABILITY_PERCENTAGE% ($AVAILABLE_ENDPOINTS/$TOTAL_ENDPOINTS endpoints)**" >> $GITHUB_STEP_SUMMARY

      - name: 📊 Service Dependency Check
        run: |
          echo "## 🔗 Service Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          # Check database connectivity
          if nc -z postgres.example.com 5432 2>/dev/null; then
            echo "| PostgreSQL | ✅ Connected | Port 5432 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| PostgreSQL | ❌ Disconnected | Port 5432 |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check Redis connectivity
          if nc -z redis.example.com 6379 2>/dev/null; then
            echo "| Redis | ✅ Connected | Port 6379 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Redis | ❌ Disconnected | Port 6379 |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check external APIs
          if curl -f -s https://api.github.com > /dev/null; then
            echo "| GitHub API | ✅ Available | - |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| GitHub API | ❌ Unavailable | - |" >> $GITHUB_STEP_SUMMARY
          fi

  # Resource Usage Monitoring
  resource-monitoring:
    name: 💾 Resource Usage Monitoring
    runs-on: ubuntu-latest

    steps:
      - name: 💾 System Resource Check
        run: |
          echo "## 💾 System Resources" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # CPU Usage
          CPU_USAGE=$(top -bn1 | grep "Cpu(s)" | awk '{print $2}' | sed 's/%us,//')
          echo "| Metric | Usage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| CPU | $CPU_USAGE% |" >> $GITHUB_STEP_SUMMARY

          # Memory Usage
          MEMORY_INFO=$(free -m | awk 'NR==2{printf "%.1f%%", $3*100/$2}')
          echo "| Memory | $MEMORY_INFO |" >> $GITHUB_STEP_SUMMARY

          # Disk Usage
          DISK_USAGE=$(df -h / | awk 'NR==2 {print $5}')
          echo "| Disk | $DISK_USAGE |" >> $GITHUB_STEP_SUMMARY

          # Network Connections
          CONNECTIONS=$(netstat -an 2>/dev/null | grep ESTABLISHED | wc -l || echo 0)
          echo "| Network Connections | $CONNECTIONS |" >> $GITHUB_STEP_SUMMARY

      - name: 🐳 Docker Resource Check
        if: hash docker 2>/dev/null
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🐳 Container Resources" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Container | CPU | Memory | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----|--------|--------|" >> $GITHUB_STEP_SUMMARY

          docker stats --no-stream --format "table {{.Container}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.Status}}" | tail -n +2 >> $GITHUB_STEP_SUMMARY

      - name: 📊 Generate Resource Report
        run: |
          # Create resource report
          cat > resource-report.json << EOF
          {
            "timestamp": "$(date -Iseconds)",
            "cpu_usage": "$CPU_USAGE",
            "memory_usage": "$MEMORY_INFO",
            "disk_usage": "$DISK_USAGE",
            "network_connections": $CONNECTIONS,
            "hostname": "$(hostname)",
            "os": "$(uname -a)"
          }
          EOF

      - name: 📤 Upload Resource Report
        uses: actions/upload-artifact@v4
        with:
          name: resource-monitoring
          path: resource-report.json
          retention-days: 30

  # Error and Log Monitoring
  log-monitoring:
    name: 📋 Log Monitoring
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📋 Analyze Application Logs
        run: |
          echo "## 📋 Log Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for error patterns
          ERROR_PATTERNS=(
            "ERROR"
            "FATAL"
            "Exception"
            "Failed"
            "Timeout"
            "Connection refused"
          )

          for pattern in "${ERROR_PATTERNS[@]}"; do
            COUNT=$(grep -r "$pattern" logs/ 2>/dev/null | wc -l || echo 0)
            if [ $COUNT -gt 0 ]; then
              echo "| $pattern | $COUNT occurrences |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: 🔍 Security Log Analysis
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔍 Security Events" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for security-related logs
          SECURITY_EVENTS=(
            "authentication failure"
            "unauthorized access"
            "sql injection"
            "xss attack"
            "brute force"
            "suspicious activity"
          )

          for event in "${SECURITY_EVENTS[@]}"; do
            COUNT=$(grep -ri "$event" logs/ 2>/dev/null | wc -l || echo 0)
            if [ $COUNT -gt 0 ]; then
              echo "⚠️ $event: $COUNT occurrences" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: 📊 Performance Log Analysis
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚡ Performance Metrics from Logs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract response times from logs
          if [ -f logs/application.log ]; then
            AVG_RESPONSE_TIME=$(grep "response_time" logs/application.log | awk '{sum+=$NF; count++} END {if(count>0) print sum/count; else print 0}')
            echo "| Average Response Time | ${AVG_RESPONSE_TIME}ms |" >> $GITHUB_STEP_SUMMARY

            # Count slow requests (>1000ms)
            SLOW_REQUESTS=$(grep "response_time.*[0-9]\{4,\}" logs/application.log | wc -l || echo 0)
            echo "| Slow Requests (>1000ms) | $SLOW_REQUESTS |" >> $GITHUB_STEP_SUMMARY
          fi

  # Custom Metrics Monitoring
  custom-metrics:
    name: 📈 Custom Metrics
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 📈 Collect Application Metrics
        run: |
          # Create custom metrics collector
          cat > metrics-collector.js << 'EOF'
          const fs = require('fs');
          const https = require('https');

          async function collectMetrics() {
            const metrics = {
              timestamp: new Date().toISOString(),
              application: {
                uptime: process.uptime(),
                memory: process.memoryUsage(),
                cpu: process.cpuUsage()
              },
              custom: {}
            };

            // Collect custom application metrics
            try {
              const response = await fetch('http://localhost:3000/api/metrics');
              if (response.ok) {
                metrics.custom = await response.json();
              }
            } catch (error) {
              console.log('Could not fetch custom metrics:', error.message);
            }

            // Save metrics
            fs.writeFileSync('application-metrics.json', JSON.stringify(metrics, null, 2));
            console.log('Metrics collected:', JSON.stringify(metrics, null, 2));
          }

          collectMetrics().catch(console.error);
          EOF

          node metrics-collector.js

      - name: 📊 Metrics Summary
        run: |
          if [ -f application-metrics.json ]; then
            echo "## 📈 Application Metrics" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat application-metrics.json | jq -r '
              "| Metric | Value |",
              "|--------|-------|",
              "| Uptime | \(.application.uptime) seconds |",
              "| Memory Used | \(.application.memory.heapUsed / 1024 / 1024 | floor) MB |",
              "| Memory Total | \(.application.memory.heapTotal / 1024 / 1024 | floor) MB |"
            ' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload Metrics
        uses: actions/upload-artifact@v4
        with:
          name: application-metrics
          path: application-metrics.json
          retention-days: 30

  # Alert Threshold Checks
  alert-checks:
    name: 🚨 Alert Threshold Checks
    runs-on: ubuntu-latest
    needs: [performance-monitoring, availability-monitoring, resource-monitoring]

    steps:
      - name: 🚨 Check Alert Conditions
        run: |
          echo "## 🚨 Alert Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ALERTS_TRIGGERED=0

          # Check availability
          AVAILABILITY=${{ needs.availability-monitoring.outputs.availability }}
          if [ "$AVAILABILITY" -lt 100 ]; then
            echo "🚨 **Availability Alert**: Only $AVAILABILITY% of endpoints are online" >> $GITHUB_STEP_SUMMARY
            ((ALERTS_TRIGGERED++))
          else
            echo "✅ **Availability**: All endpoints online ($AVAILABILITY%)" >> $GITHUB_STEP_SUMMARY
          fi

          # Check performance thresholds
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Performance Thresholds" >> $GITHUB_STEP_SUMMARY

          # Add more threshold checks based on your application requirements
          if [ -f performance-metrics.json ]; then
            LOAD_TIME=$(cat performance-metrics.json | jq -r '.loadTime // 0')
            if (( $(echo "$LOAD_TIME > 3000" | bc -l) )); then
              echo "🚨 **Performance Alert**: Load time is ${LOAD_TIME}ms (>3000ms threshold)" >> $GITHUB_STEP_SUMMARY
              ((ALERTS_TRIGGERED++))
            else
              echo "✅ **Performance**: Load time is ${LOAD_TIME}ms (within threshold)" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Set alert status
          echo "alert_count=$ALERTS_TRIGGERED" >> $GITHUB_ENV

      - name: 🚨 Trigger Alert Notifications
        if: env.alert_count > 0
        run: |
          echo "Triggering alert notifications for ${{ env.alert_count }} alerts..."

      - name: 📧 Alert Notification
        if: env.alert_count > 0
        uses: 8398a7/action-slack@v3
        with:
          status: warning
          channel: '#alerts'
          text: |
            🚨 **HASEB Monitoring Alerts**
            Repository: ${{ github.repository }}
            Time: $(date)
            Alerts Triggered: ${{ env.alert_count }}

            Please check the monitoring dashboard for details.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Monitoring Dashboard Update
  dashboard-update:
    name: 📊 Dashboard Update
    runs-on: ubuntu-latest
    needs: [performance-monitoring, availability-monitoring, resource-monitoring, custom-metrics]

    steps:
      - name: 📥 Download All Monitoring Data
        uses: actions/download-artifact@v4
        with:
          path: monitoring-data/
          pattern: "*-metrics"
          merge-multiple: true

      - name: 📊 Update Monitoring Dashboard
        run: |
          # Create dashboard HTML
          cat > monitoring-dashboard.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>HASEB Monitoring Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <style>
              body { font-family: Arial, sans-serif; margin: 20px; }
              .metric { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
              .alert { background-color: #ffebee; border-color: #f44336; }
              .success { background-color: #e8f5e8; border-color: #4caf50; }
              .chart { width: 100%; height: 400px; margin: 20px 0; }
            </style>
          </head>
          <body>
            <h1>🚀 HASEB Monitoring Dashboard</h1>
            <p>Last updated: $(date)</p>

            <div class="metric">
              <h2>📊 System Status</h2>
              <div id="system-status">Loading...</div>
            </div>

            <div class="metric">
              <h2>⚡ Performance Metrics</h2>
              <canvas id="performanceChart" class="chart"></canvas>
            </div>

            <div class="metric">
              <h2>🌍 Availability</h2>
              <div id="availability-status">Loading...</div>
            </div>

            <script>
              // Load monitoring data and update charts
              fetch('./monitoring-data/application-metrics.json')
                .then(response => response.json())
                .then(data => {
                  // Update dashboard with live data
                  document.getElementById('system-status').innerHTML = `
                    <p>Uptime: ${data.application.uptime} seconds</p>
                    <p>Memory: ${Math.round(data.application.memory.heapUsed / 1024 / 1024)} MB</p>
                  `;
                })
                .catch(error => console.error('Error loading data:', error));

              // Initialize charts
              const ctx = document.getElementById('performanceChart').getContext('2d');
              const performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                  labels: ['Time'],
                  datasets: [{
                    label: 'Response Time',
                    data: [0],
                    borderColor: 'rgb(75, 192, 192)',
                    tension: 0.1
                  }]
                },
                options: {
                  responsive: true,
                  scales: {
                    y: {
                      beginAtZero: true,
                      title: {
                        display: true,
                        text: 'Response Time (ms)'
                      }
                    }
                  }
                }
              });
            </script>
          </body>
          </html>
          EOF

      - name: 📤 Upload Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-dashboard
          path: monitoring-dashboard.html
          retention-days: 7

  # Monitoring Summary
  monitoring-summary:
    name: 📊 Monitoring Summary
    runs-on: ubuntu-latest
    needs: [performance-monitoring, availability-monitoring, resource-monitoring, alert-checks]
    if: always()

    steps:
      - name: 📊 Generate Monitoring Summary
        run: |
          echo "## 📊 HASEB Monitoring Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Monitoring Type | Status | Key Metrics |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|--------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| ⚡ Performance | ${{ needs.performance-monitoring.result }} | Lighthouse scores collected |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌍 Availability | ${{ needs.availability-monitoring.result }} | ${{ needs.availability-monitoring.outputs.availability }}% available |" >> $GITHUB_STEP_SUMMARY
          echo "| 💾 Resources | ${{ needs.resource-monitoring.result }} | System metrics collected |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚨 Alert Checks | ${{ needs.alert-checks.result }} | ${{ env.alert_count }} alerts triggered |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.alert-checks.result }}" == "success" ]; then
            echo "✅ **All monitoring checks passed!** System is healthy." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some monitoring checks failed.** Review the alerts above." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Monitoring Dashboard](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Performance Metrics](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [System Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: 📧 Daily Summary Notification
        if: github.event_name == 'schedule'
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#monitoring'
          text: |
            📊 **HASEB Daily Monitoring Report**
            Date: $(date +%Y-%m-%d)
            Availability: ${{ needs.availability-monitoring.outputs.availability }}%
            Alerts: ${{ env.alert_count }}

            System health: ✅ Good
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}