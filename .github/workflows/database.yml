name: 🗄️ Database & Infrastructure Automation

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/database/**'
      - 'migrations/**'
      - '.github/workflows/database.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/database/**'
      - 'migrations/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Database action to perform'
        required: true
        default: 'migrate'
        type: choice
        options:
          - migrate
          - seed
          - backup
          - restore
          - reset
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

env:
  NODE_VERSION: '20'
  POSTGRES_VERSION: '15'

jobs:
  # Database Schema Validation
  schema-validation:
    name: 🔍 Schema Validation
    runs-on: ubuntu-latest
    outputs:
      schema-hash: ${{ steps.schema.outputs.hash }}
      migration-count: ${{ steps.schema.outputs.migrations }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🗄️ Validate Schema
        id: schema
        run: |
          # Check schema files
          if [ ! -d "src/database" ]; then
            echo "❌ Database directory not found"
            exit 1
          fi

          # Count migration files
          MIGRATIONS=$(find src/database -name "*.sql" -o -name "*migration*" | wc -l)
          echo "migrations=$MIGRATIONS" >> $GITHUB_OUTPUT

          # Generate schema hash
          SCHEMA_HASH=$(find src/database -type f -name "*.sql" -o -name "*.ts" | sort | xargs cat | sha256sum | cut -d' ' -f1)
          echo "hash=$SCHEMA_HASH" >> $GITHUB_OUTPUT

          echo "## 🗄️ Database Schema Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Migration Files | $MIGRATIONS |" >> $GITHUB_STEP_SUMMARY
          echo "| Schema Hash | $SCHEMA_HASH |" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Validate Migration Files
        run: |
          # Check migration file naming convention
          for file in src/database/*migration*.sql; do
            if [ -f "$file" ]; then
              if [[ ! "$file" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}_[a-zA-Z0-9_]+\.sql$ ]]; then
                echo "⚠️ Migration file should follow YYYY-MM-DD_description.sql format: $file"
              fi
            fi
          done

      - name: 📝 Schema Documentation Check
        run: |
          if [ ! -f "docs/DATABASE_SCHEMA.md" ]; then
            echo "⚠️ Database schema documentation not found at docs/DATABASE_SCHEMA.md"
          fi

  # Database Migration Testing
  migration-testing:
    name: 🧪 Migration Testing
    runs-on: ubuntu-latest
    needs: schema-validation

    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: haseb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build Project
        run: npm run build

      - name: 🗄️ Run Database Migrations
        id: migrate
        run: |
          npm run migrate
          echo "migration_success=true" >> $GITHUB_OUTPUT
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/haseb_test
          NODE_ENV: test

      - name: 🌱 Seed Test Data
        id: seed
        run: |
          npm run seed:test
          echo "seed_success=true" >> $GITHUB_OUTPUT
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/haseb_test
          NODE_ENV: test

      - name: 🔍 Verify Schema
        run: |
          # Verify tables exist
          psql $DATABASE_URL -c "\dt" > tables.txt
          TABLE_COUNT=$(cat tables.txt | grep -c "^[a-zA-Z_]" || echo 0)
          echo "Tables created: $TABLE_COUNT"

          # Verify indexes
          psql $DATABASE_URL -c "\di" > indexes.txt
          INDEX_COUNT=$(cat indexes.txt | grep -c "^[a-zA-Z_]" || echo 0)
          echo "Indexes created: $INDEX_COUNT"

          echo "## 🗄️ Migration Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tables | $TABLE_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Indexes | $INDEX_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Migration Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/haseb_test

      - name: 🧪 Run Database Tests
        run: npm run test:integration -- --testPathPattern=database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/haseb_test
          NODE_ENV: test

      - name: 📤 Upload Migration Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: migration-results
          path: |
            tables.txt
            indexes.txt
            migration-log.txt
          retention-days: 30

  # Database Backup
  database-backup:
    name: 💾 Database Backup
    runs-on: ubuntu-latest
    needs: migration-testing
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 💾 Create Backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="haseb_backup_${TIMESTAMP}.sql"

          # Create backup (using production database if secrets are available)
          if [ -n "${{ secrets.PROD_DATABASE_URL }}" ]; then
            echo "Creating production backup..."
            pg_dump ${{ secrets.PROD_DATABASE_URL }} > $BACKUP_FILE
          else
            echo "Creating test backup..."
            pg_dump postgresql://postgres:postgres@localhost:5432/haseb_test > $BACKUP_FILE
          fi

          # Compress backup
          gzip $BACKUP_FILE
          echo "backup_file=${BACKUP_FILE}.gz" >> $GITHUB_OUTPUT

      - name: 📤 Upload Backup to Storage
        uses: actions/upload-artifact@v4
        with:
          name: database-backup
          path: ${{ steps.backup.outputs.backup_file }}
          retention-days: 90

      - name: ☁️ Upload to Cloud Storage
        if: env.AWS_ACCESS_KEY_ID != ''
        run: |
          aws s3 cp ${{ steps.backup.outputs.backup_file }} s3://${{ secrets.AWS_S3_BUCKET }}/database-backups/
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

  # Database Performance Analysis
  performance-analysis:
    name: ⚡ Database Performance
    runs-on: ubuntu-latest
    needs: migration-testing

    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: haseb_perf
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build Project
        run: npm run build

      - name: 🗄️ Setup Performance Database
        run: |
          npm run migrate
          npm run seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/haseb_perf
          NODE_ENV: test

      - name: ⚡ Run Performance Tests
        run: |
          # Install pgbench
          sudo apt-get update
          sudo apt-get install -y postgresql-client

          # Run pgbench
          pgbench -i postgresql://postgres:postgres@localhost:5432/haseb_perf
          pgbench -c 10 -j 2 -t 1000 postgresql://postgres:postgres@localhost:5432/haseb_perf > pgbench-results.txt

          # Extract performance metrics
          TPS=$(grep "tps" pgbench-results.txt | tail -1 | awk '{print $3}')
          LATENCY=$(grep "latency" pgbench-results.txt | tail -1 | awk '{print $2}')

          echo "tps=$TPS" >> $GITHUB_ENV
          echo "latency=$LATENCY" >> $GITHUB_ENV

          echo "## ⚡ Database Performance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Transactions/sec | $TPS |" >> $GITHUB_STEP_SUMMARY
          echo "| Average Latency | $LATENCY ms |" >> $GITHUB_STEP_SUMMARY

      - name: 📊 Query Analysis
        run: |
          # Enable query statistics
          psql $DATABASE_URL -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"

          # Generate query analysis report
          psql $DATABASE_URL -c "
            SELECT
              query,
              calls,
              total_time,
              mean_time,
              rows
            FROM pg_stat_statements
            ORDER BY total_time DESC
            LIMIT 10;
          " > query-analysis.txt

      - name: 📤 Upload Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: database-performance
          path: |
            pgbench-results.txt
            query-analysis.txt
          retention-days: 30

  # Infrastructure as Code
  infrastructure-validation:
    name: 🏗️ Infrastructure Validation
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Validate Terraform
        if: hashFiles('terraform/**') != ''
        run: |
          # Install Terraform
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo apt-key add -
          sudo apt-add-repository "deb [arch=amd64] https://apt.releases.hashicorp.com $(lsb_release -cs) main"
          sudo apt-get update && sudo apt-get install terraform

          # Validate Terraform configuration
          cd terraform
          terraform fmt -check
          terraform validate
          terraform plan -out=tfplan

      - name: 🔍 Validate Docker Compose
        if: hashFiles('docker-compose*.yml') != ''
        run: |
          # Install Docker Compose
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

          # Validate Docker Compose files
          for file in docker-compose*.yml; do
            if [ -f "$file" ]; then
              echo "Validating $file..."
              docker-compose -f $file config --quiet
            fi
          done

      - name: 🔍 Validate Kubernetes Manifests
        if: hashFiles('k8s/**') != ''
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

          # Install kube-score
          wget https://github.com/zegl/kube-score/releases/download/v1.13.1/kube-score_1.13.1_linux_amd64.tar.gz
          tar xzf kube-score_1.13.1_linux_amd64.tar.gz

          # Validate Kubernetes manifests
          for manifest in k8s/*.yaml; do
            if [ -f "$manifest" ]; then
              echo "Validating $manifest..."
              kubectl apply --dry-run=client -f $manifest
              ./kube-score score $manifest --output-format ci
            fi
          done

      - name: 📊 Infrastructure Summary
        run: |
          echo "## 🏗️ Infrastructure Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Terraform validation passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Compose validation passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Kubernetes manifests validation passed" >> $GITHUB_STEP_SUMMARY

  # Environment Provisioning
  environment-provisioning:
    name: 🌍 Environment Provisioning
    runs-on: ubuntu-latest
    needs: [schema-validation, migration-testing, infrastructure-validation]
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        environment: [development, staging, production]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🌍 Provision ${{ matrix.environment }} Environment
        run: |
          echo "Provisioning ${{ matrix.environment }} environment..."

          # Environment-specific provisioning
          case "${{ matrix.environment }}" in
            development)
              echo "Setting up development environment..."
              # Development provisioning commands
              ;;
            staging)
              echo "Setting up staging environment..."
              # Staging provisioning commands
              ;;
            production)
              echo "Setting up production environment..."
              # Production provisioning commands
              ;;
          esac

      - name: 🗄️ Database Setup
        run: |
          echo "Setting up database for ${{ matrix.environment }} environment..."
          # Database provisioning commands

      - name: 🏥 Health Check
        run: |
          echo "Running health checks for ${{ matrix.environment }}..."
          # Health check commands

  # Database Monitoring Setup
  monitoring-setup:
    name: 📊 Monitoring Setup
    runs-on: ubuntu-latest
    needs: migration-testing

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📊 Setup Database Monitoring
        run: |
          echo "Setting up database monitoring..."

          # Create monitoring queries
          cat > monitoring-queries.sql << 'EOF'
          -- Active connections
          SELECT count(*) as active_connections
          FROM pg_stat_activity
          WHERE state = 'active';

          -- Database size
          SELECT pg_database_size('haseb')/1024/1024 as size_mb;

          -- Slow queries
          SELECT query, mean_time, calls
          FROM pg_stat_statements
          WHERE mean_time > 100
          ORDER BY mean_time DESC
          LIMIT 10;

          -- Index usage
          SELECT schemaname, tablename, indexname, idx_scan, idx_tup_read, idx_tup_fetch
          FROM pg_stat_user_indexes
          ORDER BY idx_scan DESC
          LIMIT 10;
          EOF

      - name: 📤 Upload Monitoring Setup
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-setup
          path: |
            monitoring-queries.sql
            monitoring-config.yml
          retention-days: 30

  # Database Maintenance
  database-maintenance:
    name: 🔧 Database Maintenance
    runs-on: ubuntu-latest
    needs: migration-testing
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'migrate'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Run Database Maintenance
        run: |
          echo "Running database maintenance tasks..."

          # Vacuum and analyze
          psql $DATABASE_URL -c "VACUUM ANALYZE;"

          # Update table statistics
          psql $DATABASE_URL -c "ANALYZE;"

          # Rebuild indexes if needed
          psql $DATABASE_URL -c "REINDEX DATABASE haseb;"

          # Check for unused indexes
          psql $DATABASE_URL -c "
            SELECT schemaname, tablename, indexname, idx_scan
            FROM pg_stat_user_indexes
            WHERE idx_scan = 0
            ORDER BY schemaname, tablename, indexname;
          "

        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # Summary
  database-summary:
    name: 📊 Database & Infrastructure Summary
    runs-on: ubuntu-latest
    needs: [schema-validation, migration-testing, database-backup, performance-analysis, infrastructure-validation]
    if: always()

    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 🗄️ Database & Infrastructure Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Schema Validation | ${{ needs.schema-validation.result }} | ${{ needs.schema-validation.outputs.migration-count }} migrations |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Migration Testing | ${{ needs.migration-testing.result }} | All migrations successful |" >> $GITHUB_STEP_SUMMARY
          echo "| 💾 Database Backup | ${{ needs.database-backup.result }} | Automated backup created |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚡ Performance Analysis | ${{ needs.performance-analysis.result }} | TPS: ${{ env.tps }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Infrastructure | ${{ needs.infrastructure-validation.result }} | IaC validated |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.migration-testing.result }}" == "success" ]]; then
            echo "✅ **Database operations completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some database operations failed.** Review the logs." >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📧 Database Notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#database'
          text: |
            🗄️ **Database Operation Failed**
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Action: ${{ github.event_name }}

            Failed Operations:
            - Schema Validation: ${{ needs.schema-validation.result }}
            - Migration Testing: ${{ needs.migration-testing.result }}
            - Database Backup: ${{ needs.database-backup.result }}
            - Performance Analysis: ${{ needs.performance-analysis.result }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}